<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile — MindMate AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Page layout ── */
    .inner-page {
      flex: 1;
      overflow-y: auto;
      padding: 56px 64px;
      background: var(--c-bg);
    }
    .inner-page .page-header { margin-bottom: 36px; }
    .inner-page .page-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 5px; }
    .inner-page .page-header p  { color: var(--c-muted); font-size: 14px; }

    /* Two-column: avatar left, info right */
    .profile-grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      align-items: start;
      max-width: 820px;
    }

    .avatar-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      animation: gentleFadeUp 0.35s ease both;
    }
    .avatar-wrapper { position: relative; width: 96px; height: 96px; }
    .profile-avatar {
      width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--c-surface);
      box-shadow: 0 0 0 3px var(--c-accent-glow), var(--shadow-md);
    }
    .avatar-upload-btn {
      position: absolute; bottom: 2px; right: 2px;
      background: linear-gradient(135deg, var(--c-accent), var(--c-accent2));
      color: white; width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px;
      box-shadow: 0 2px 8px rgba(124,110,230,0.4);
      transition: transform 0.18s ease;
    }
    .avatar-upload-btn:hover { transform: scale(1.12); }
    .avatar-name  { font-size: 15px; font-weight: 600; color: var(--c-text); text-align: center; margin-top: 4px; }
    .avatar-email { font-size: 12px; color: var(--c-muted); text-align: center; }
    .avatar-badge {
      margin-top: 6px; padding: 4px 14px; border-radius: 50px;
      background: var(--c-accent-soft); color: var(--c-accent);
      font-size: 11.5px; font-weight: 500; border: 1px solid var(--c-border);
    }

    .info-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: gentleFadeUp 0.4s ease both;
    }
    .info-card-header {
      padding: 20px 28px 18px;
      border-bottom: 1px solid var(--c-border);
    }
    .info-card-header h3 { font-size: 14.5px; font-weight: 600; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid var(--c-border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row-label { font-size: 13.5px; color: var(--c-muted); }
    .info-row-value { font-size: 13.5px; font-weight: 500; color: var(--c-text); }

    @keyframes gentleFadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <script>
    if (!localStorage.getItem("loggedInUser")) window.location.href = "login.html";
    if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark-mode");
  </script>

  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

  <header class="mobile-header" aria-label="Mobile navigation">
    <button class="hamburger" onclick="openSidebar()" aria-label="Open menu" aria-expanded="false" id="hamburgerBtn">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-logo">MindMate AI</span>
  </header>

  <div class="app-container">

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main sidebar">
      <h2 class="logo">MindMate AI</h2>
      <div class="sidebar-profile">
        <img id="sidebarAvatar" class="sidebar-avatar" alt="Your avatar">
        <div class="sidebar-user">
          <span id="sidebarName"></span>
        </div>
      </div>
      <nav class="nav-main" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html">Chat</a>
        <a href="journal.html">Journal</a>
        <a href="calm.html">Calm Space</a>
      </nav>
      <nav class="nav-secondary" aria-label="Account navigation">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
      <nav class="nav-info" aria-label="Info pages">
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
      <div class="sidebar-footer">
        <button id="audioToggle" class="sidebar-audio-btn" aria-label="Toggle calm audio">🎵 Calm Audio</button>
        <button onclick="logout()" class="logout-btn" aria-label="Log out">Logout</button>
      </div>
    </aside>

    <main class="inner-page" role="main">

      <div class="page-header">
        <h1>👤 Profile</h1>
        <p>Manage your account information</p>
      </div>

      <div class="profile-grid">

        <div class="avatar-card">
          <div class="avatar-wrapper">
            <img id="profileAvatar" class="profile-avatar" alt="Profile picture">
            <label for="avatarUpload" class="avatar-upload-btn" title="Change photo">📷</label>
            <input type="file" id="avatarUpload" accept="image/*" hidden>
          </div>
          <span class="avatar-name"  id="avatarName"></span>
          <span class="avatar-email" id="avatarEmail"></span>
          <span class="avatar-badge">Active User</span>
        </div>

        <div class="info-card">
          <div class="info-card-header"><h3>Account Information</h3></div>
          <div class="info-row">
            <span class="info-row-label">Display Name</span>
            <span class="info-row-value" id="profileNameDisplay"></span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Email Address</span>
            <span class="info-row-value" id="profileEmailDisplay"></span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Member Since</span>
            <span class="info-row-value" id="profileMemberSince"></span>
          </div>
          <div class="info-row">
            <span class="info-row-label">Account Status</span>
            <span class="info-row-value" style="color:#22c55e;">● Active</span>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="sidebar.js"></script>
  <script src="toast.js"></script>
  <script src="audio.js"></script>
  <script src="effects.js"></script>
  <script>
    function safeParseJSON(v, f) { try { return v ? JSON.parse(v) : f; } catch { return f; } }

    const email     = localStorage.getItem("loggedInEmail");
    const user      = email ? safeParseJSON(localStorage.getItem("mindmate_user_" + email), null) : null;
    const name      = user?.name || localStorage.getItem("loggedInUser") || "User";
    const userEmail = user?.email || email || "—";
    const createdAt = user?.createdAt
      ? new Date(user.createdAt).toLocaleDateString([], { year:"numeric", month:"long", day:"numeric" })
      : "Unknown";

    document.getElementById("avatarName").textContent         = name;
    document.getElementById("avatarEmail").textContent        = userEmail;
    document.getElementById("profileNameDisplay").textContent  = name;
    document.getElementById("profileEmailDisplay").textContent = userEmail;
    document.getElementById("profileMemberSince").textContent  = createdAt;

    const avatarEl    = document.getElementById("profileAvatar");
    const savedAvatar = localStorage.getItem("mindmate_avatar_" + (email || ""));
    avatarEl.src = savedAvatar ||
      "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=8b7cf6&color=fff";

    document.getElementById("avatarUpload").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { showToast("Image must be under 2MB", "error"); return; }
      const reader = new FileReader();
      reader.onload = e => {
        avatarEl.src = e.target.result;
        try {
          localStorage.setItem("mindmate_avatar_" + (email || ""), e.target.result);
          showToast("Profile picture updated", "success");
        } catch { showToast("Image too large to save", "error"); }
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
