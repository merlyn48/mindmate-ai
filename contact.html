<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact - MindMate AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

  <header class="mobile-header" aria-label="Mobile navigation">
    <button class="hamburger" onclick="openSidebar()" aria-label="Open menu" aria-expanded="false" id="hamburgerBtn">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-logo">MindMate AI</span>
  </header>

  <div class="app-container">

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main sidebar">
      <h2 class="logo">MindMate AI</h2>
      <div class="sidebar-profile">
        <img id="sidebarAvatar" class="sidebar-avatar" alt="Your avatar">
        <div class="sidebar-user">
          <span id="sidebarName"></span>
        </div>
      </div>
      <nav class="nav-main" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html">Chat</a>
        <a href="journal.html">Journal</a>
        <a href="calm.html">Calm Space</a>
      </nav>
      <nav class="nav-secondary" aria-label="Account navigation">
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
      <nav class="nav-info" aria-label="Info pages">
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
      <div class="sidebar-footer">
        <button id="audioToggle" class="sidebar-audio-btn" aria-label="Toggle calm audio">🎵 Calm Audio</button>
        <button onclick="logout()" class="logout-btn" aria-label="Log out">Logout</button>
      </div>
    </aside>

        <main class="chat-section">

            <div class="page-wrapper">

                <div class="page-header">
                    <h1>📩 Contact Us</h1>
                    <p>Have questions or feedback? We'd love to hear from you.</p>
                </div>

                <div class="card-box">

                    <form id="contactForm">

                        <input type="hidden" name="access_key" value="639f2747-9168-4827-a211-de4f7ab9d818">

                        <input type="text" name="name" placeholder="Your Name" class="input-style" required>

                        <input type="email" name="email" placeholder="Your Email" class="input-style" required>

                        <textarea name="message" placeholder="Your Message" class="input-style" required></textarea>

                        <button type="submit" class="primary-btn">
                            📨 Send Message
                        </button>

                    </form>

                </div>

            </div>

        </main>

    </div>

    <script>
        const form = document.getElementById("contactForm");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(form);

            const response = await fetch("https://api.web3forms.com/submit", {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                showToast("Message sent successfully!", "success");
                form.reset();
            } else {
                showToast("Failed to send message", "error");
            }
        });
    </script>

    <script src="sidebar.js"></script>
    <script src="toast.js"></script>
    <script src="audio.js"></script>
    <script src="effects.js"></script>
</body>

</html>
