<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journal – MindMate AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f3f0ff, #e8f9f5);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2a2542;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(124,110,230,0.3);
      font-size: 14px;
      resize: none;
      outline: none;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg,#7c6ee6,#9184ff);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .entry {
      background: rgba(255,255,255,0.8);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .entry h4 {
      margin: 0 0 6px;
      color: #7c6ee6;
      font-size: 13px;
    }

    .entry p {
      margin: 0;
      color: #333;
      font-size: 14px;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #7c6ee6;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📝 Your Journal</h1>

  <textarea id="journalInput" placeholder="Write your thoughts..."></textarea>
  <button onclick="saveJournal()">Save Entry</button>

  <div id="entries"></div>

  <a class="back" href="dashboard.html">← Back to Dashboard</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="toast.js"></script>
<script src="auth.js"></script>

<script>
if (!localStorage.getItem("loggedInUser")) {
  window.location.href = "login.html";
}

async function saveJournal() {
  const text = document.getElementById("journalInput").value.trim();
  const uid = localStorage.getItem("loggedInUID");

  if (!text) {
    showToast("Write something first ✍️", "error");
    return;
  }

  const date = new Date().toLocaleDateString("en-CA");

  try {
    await _db.collection("users")
      .doc(uid)
      .collection("journals")
      .doc(date)
      .set({
        text,
        createdAt: Date.now()
      });

    showToast("Journal saved 💾", "success");
    document.getElementById("journalInput").value = "";

    loadJournals();

  } catch (err) {
    console.error(err);
    showToast("Error saving journal", "error");
  }
}

async function loadJournals() {
  const uid = localStorage.getItem("loggedInUID");

  const snap = await _db.collection("users")
    .doc(uid)
    .collection("journals")
    .orderBy("createdAt", "desc")
    .get();

  const container = document.getElementById("entries");
  container.innerHTML = "";

  snap.forEach(doc => {
    const data = doc.data();

    container.innerHTML += `
      <div class="entry">
        <h4>${doc.id}</h4>
        <p>${data.text}</p>
      </div>
    `;
  });
}

loadJournals();
</script>

</body>
</html>
