<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Journal – MindMate AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* TOASTS */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--c-surface);
      color: var(--c-text);
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow-lg);
      font-size: 13.5px;
      opacity: 0;
      transform: translateY(-10px) scale(0.96);
      animation: toastIn 0.38s var(--ease-spring) forwards;
      min-width: 220px;
      max-width: 360px;
    }

    .toast.success {
      border-left: 4px solid #22c55e;
    }

    .toast.error {
      border-left: 4px solid #ef4444;
    }

    .toast.info {
      border-left: 4px solid var(--c-accent);
    }

    @keyframes toastIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-10px) scale(0.95)
      }
    }

    /* OTHER CSS*/
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f3f0ff, #e8f9f5);
      margin: 0;
      padding: 0;
    }

    .prompt {
      margin-bottom: 8px;
      color: #6b6b8a;
      font-size: 14px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2a2542;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(124, 110, 230, 0.3);
      font-size: 14px;
      resize: none;
      outline: none;
      margin-bottom: 12px;
    }

button:not(.edit-btn):not(.delete-btn) {
  padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c6ee6, #9184ff);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }

        .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #7c6ee6;
      text-decoration: none;
      font-weight: 600;
    }

      .confirm-box {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.confirm-box.hidden {
  display: none;
}

.confirm-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 280px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.confirm-actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.confirm-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#confirmYes {
  background: #ef4444;
  color: white;
}

#confirmNo {
  background: #e5e7eb;
}
    /* ── Journal Page Glow Background ───────────────── */

body {
  background:
    radial-gradient(circle at top left, #efe7ff 0%, transparent 30%),
    radial-gradient(circle at top right, #dff7ff 0%, transparent 30%),
    linear-gradient(180deg, #f8f6ff 0%, #eef7f6 100%);
  min-height: 100vh;
}

/* ── Main Container ───────────────── */

.journal-container {
  max-width: 760px;
  margin: auto;
  padding: 60px 20px;
}

/* ── Heading ───────────────── */

.journal-title {
  text-align: center;
  font-size: 52px;
  font-weight: 700;
  margin-bottom: 10px;
  color: #2d234d;
  letter-spacing: -1px;
}

.journal-subtitle {
  text-align: center;
  color: #6f6a8b;
  margin-bottom: 34px;
  font-size: 15px;
}

/* ── Prompt Bubble ───────────────── */

.daily-prompt {
  background: rgba(255,255,255,0.65);
  border: 1px solid rgba(124,106,247,0.12);
  backdrop-filter: blur(14px);
  border-radius: 18px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 14px;
  color: #5c5475;
  text-align: center;
}

/* ── Textarea ───────────────── */

.journal-input {
  width: 100%;
  min-height: 240px;
  border: none;
  outline: none;
  resize: vertical;

  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);

  border-radius: 24px;
  padding: 24px;

  font-size: 17px;
  line-height: 1.8;

  box-shadow:
    0 10px 40px rgba(124,106,247,0.08);

  transition: all 0.25s ease;
}

.journal-input:focus {
  transform: translateY(-2px);
  box-shadow:
    0 18px 50px rgba(124,106,247,0.12);
}

/* ── Save Button ───────────────── */

.save-btn {
  margin-top: 18px;
  width: 100%;
  border: none;
  border-radius: 18px;
  padding: 16px;

  background: linear-gradient(135deg, #7c6af7, #9b8cff);

  color: white;
  font-size: 16px;
  font-weight: 600;

  cursor: pointer;
  transition: all 0.25s ease;
}

.save-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 12px 30px rgba(124,106,247,0.25);
}

/* ── Journal Entries ───────────────── */

.entry-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(124,106,247,0.08);

  border-radius: 24px;

  padding: 22px;
  margin-top: 24px;

  transition: all 0.25s ease;
}

.entry-card:hover {
  transform: translateY(-2px);
  box-shadow:
    0 16px 40px rgba(124,106,247,0.10);
}

/* ── Entry Header ───────────────── */

.entry-top {
  display: flex;
  align-items: center;
  justify-content: space-between;

  margin-bottom: 14px;
}

.entry-mood {
  background: #ede9fe;
  color: #6d28d9;

  padding: 6px 12px;
  border-radius: 999px;

  font-size: 12px;
  font-weight: 600;
}

.entry-date {
  font-size: 12px;
  color: #7c7a92;
}

/* ── Entry Text ───────────────── */

.entry-text {
  font-size: 16px;
  line-height: 1.8;
  color: #372f4f;

  margin-bottom: 18px;
}

/* ── Action Buttons ───────────────── */

.entry-actions {
  display: flex;
  gap: 12px;
}

.edit-btn,
.delete-btn {
  border: none;
  border-radius: 14px;
  padding: 10px 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.edit-btn {
  background: #ede9fe;
  color: #6d28d9;
}

.delete-btn {
  background: #fee2e2;
  color: #dc2626;
}

.edit-btn:hover,
.delete-btn:hover {
  transform: translateY(-1px);
}
    .journal-container {
  max-width: 820px;
  margin: auto;
  padding: 40px 24px 80px;
}

.journal-input {
  width: 100%;
  box-sizing: border-box;
}

.save-btn {
  margin-top: 16px;
  margin-bottom: 10px;
}

.entry-card {
  padding: 20px;
  margin-top: 18px;
}

.entry-text {
  margin-top: 6px;
  margin-bottom: 16px;
}

.entry-actions {
  margin-top: 10px;
}

.edit-btn,
.delete-btn {
  padding: 10px;
  font-size: 14px;
}

.back {
  margin-top: 36px;
  font-size: 15px;
}
    .save-btn {
  width: 100%;
}
  </style>
