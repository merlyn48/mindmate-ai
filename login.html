<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – MindMate AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    #bg {
      position: fixed;
      inset: 0; width: 100%; height: 100%;
      z-index: 0;
    }

    /* card */
    .card {
      position: relative;
      z-index: 10;
      width: 380px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border-radius: 24px;
      padding: 44px 40px 40px;
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow:
        0 2px 0 rgba(255,255,255,0.6) inset,
        0 32px 80px rgba(60,40,120,0.18);
      animation: cardIn 0.65s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(0.96); }
      to   { opacity:1; transform:none; }
    }

    /* brand */
    .brand { text-align:center; margin-bottom:30px; }
    .brand-icon {
      width:52px; height:52px; border-radius:50%;
      background: linear-gradient(135deg, rgba(124,110,230,0.35), rgba(125,213,200,0.3));
      border: 1.5px solid rgba(255,255,255,0.55);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; margin:0 auto 14px;
      animation: breathe 4s ease-in-out infinite;
      box-shadow: 0 4px 18px rgba(124,110,230,0.2);
    }
    @keyframes breathe {
      0%,100% { transform:scale(1);    box-shadow:0 4px 18px rgba(124,110,230,0.2); }
      50%      { transform:scale(1.07); box-shadow:0 4px 28px rgba(124,110,230,0.38); }
    }
    .brand h1 {
      font-size:20px; font-weight:600; letter-spacing:-0.02em;
      color: #2a2542;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
    }
    .brand p { font-size:13px; color:#7772a0; margin-top:3px; }

    /* inputs */
    .field { margin-bottom:12px; }
    .field input {
      width:100%; padding:13px 15px; border-radius:12px;
      border: 1.5px solid rgba(124,110,230,0.2);
      background: rgba(255,255,255,0.55);
      color: #2a2542;
      font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
      transition: border-color .25s, box-shadow .25s, background .25s, transform .2s;
    }
    .field input::placeholder { color:#a09cc0; }
    .field input:focus {
      border-color: rgba(124,110,230,0.6);
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 0 3px rgba(124,110,230,0.12);
      transform: translateY(-1px);
    }
    .field input:hover:not(:focus) {
      border-color: rgba(124,110,230,0.35);
      background: rgba(255,255,255,0.65);
    }

    /* row */
    .row {
      display:flex; justify-content:space-between; align-items:center;
      margin: 4px 0 20px; font-size:13px; color:#7772a0;
    }
    .row label { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .row input[type=checkbox] { accent-color:#7c6ee6; width:14px; height:14px; }
    .row a { color:#7c6ee6; text-decoration:none; font-weight:500; }
    .row a:hover { text-decoration:underline; }

    /* button */
    .btn {
      width:100%; padding:14px; border-radius:12px; border:none;
      background: linear-gradient(135deg, #7c6ee6, #9184ff);
      color:white; font-family:'DM Sans',sans-serif;
      font-size:15px; font-weight:600; cursor:pointer;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 6px 22px rgba(124,110,230,0.38);
      position:relative; overflow:hidden;
    }
    .btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.28) 50%,transparent 65%);
      transform:translateX(-120%); transition:transform .5s ease;
    }
    .btn:hover::after { transform:translateX(120%); }
    .btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(124,110,230,0.48); }
    .btn:active { transform:scale(0.98); }

    .switch {
      text-align:center; margin-top:18px;
      font-size:13px; color:#7772a0;
    }
    .switch a { color:#7c6ee6; font-weight:600; text-decoration:none; }
    .switch a:hover { text-decoration:underline; }

    /* cursor ripple */
    .ripple {
      position:fixed; border-radius:50%; pointer-events:none; z-index:9999;
      transform:translate(-50%,-50%) scale(0);
      background:radial-gradient(circle, rgba(124,110,230,0.28) 0%, transparent 70%);
      animation:rippleOut .85s ease-out forwards;
    }
    @keyframes rippleOut { to { transform:translate(-50%,-50%) scale(1); opacity:0; } }

    /* toasts */
    .toast-container { position:fixed; top:20px; right:20px; display:flex; flex-direction:column; gap:10px; z-index:9999; }
    .toast {
      padding:12px 18px; border-radius:12px; font-size:14px; font-family:'DM Sans',sans-serif;
      background:rgba(255,255,255,0.9); backdrop-filter:blur(12px);
      color:#2a2542; border:1px solid rgba(124,110,230,0.18);
      box-shadow:0 8px 30px rgba(60,40,120,0.12);
      opacity:0; transform:translateY(-8px) scale(0.96);
      animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .toast.success { border-left:4px solid #4ade80; }
    .toast.error   { border-left:4px solid #f87171; }
    .toast.info    { border-left:4px solid #7c6ee6; }
    @keyframes toastIn  { to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { to { opacity:0; transform:translateY(-8px) scale(0.96); } }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <h1>MindMate AI</h1>
    <p>Welcome back — take a breath</p>
  </div>

  <div class="field">
    <input type="email" id="email" placeholder="Email address" autocomplete="email">
  </div>
  <div class="field">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  </div>

  <div class="row">
    <label><input type="checkbox" id="rememberMe"> Remember me</label>
    <a href="#" onclick="forgotPassword(); return false;">Forgot password?</a>
  </div>

  <button class="btn" onclick="login()">Sign In</button>
  <div class="switch">New here? <a href="register.html">Create an account</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="toast.js"></script>
<script src="auth.js"></script>
<script>
/* ============================================================
   LIVING BACKGROUND — Soft lavender aurora, matching app theme
   Colours: #7c6ee6 (accent) · #7dd5c8 (mint) · #f0a0b8 (rose)
   ============================================================ */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, t = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── drifting aurora orbs ── */
const ORBS = Array.from({length: 14}, (_, i) => ({
  x:   Math.random(),
  y:   Math.random(),
  r:   (W * 0.18) + Math.random() * (W * 0.22),
  spd: 0.000035 + Math.random() * 0.00004,   /* very slow */
  off: Math.random() * Math.PI * 2,
  /* cycle through app palette: lavender, mint, rose */
  hue: [258, 173, 340, 258, 173, 258, 340, 173, 258, 340, 173, 258, 173, 340][i],
  sat: 60 + Math.random() * 20,
  lit: 68 + Math.random() * 14,
  a:   0.13 + Math.random() * 0.11,
}));

/* ── tiny floating particles ── */
const DOTS = Array.from({length: 55}, () => ({
  x:   Math.random(),
  y:   Math.random(),
  vy:  0.000055 + Math.random() * 0.00008,
  vx:  (Math.random() - 0.5) * 0.000045,
  r:   0.9 + Math.random() * 2,
  a:   0.22 + Math.random() * 0.38,
  hue: [258, 173, 340][Math.floor(Math.random() * 3)],
  flk: Math.random() * Math.PI * 2,
  fspd:0.018 + Math.random() * 0.025,
}));

/* ── gentle wave layers ── */
const WAVES = [
  { ampF:0.032, freqF:1.1, spdF:0.000055, yF:0.64, a:0.13, h:258 },
  { ampF:0.025, freqF:1.5, spdF:0.000070, yF:0.70, a:0.10, h:173 },
  { ampF:0.020, freqF:1.8, spdF:0.000085, yF:0.76, a:0.08, h:340 },
];

/* cursor */
let mouse = {x:0,y:0}, glow = {x:0,y:0};
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
document.addEventListener('click', e => {
  const d = document.createElement('div');
  d.className = 'ripple';
  d.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;width:130px;height:130px;`;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 900);
});

function drawWaves() {
  WAVES.forEach(w => {
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) {
      const nx = x / W;
      const y = H * w.yF
        + Math.sin(nx * w.freqF * Math.PI * 2 + t * w.spdF * 60000) * H * w.ampF
        + Math.sin(nx * w.freqF * 1.7 * Math.PI * 2 + t * w.spdF * 38000 + 1.2) * H * w.ampF * 0.45;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    const g = ctx.createLinearGradient(0, H * (w.yF - w.ampF * 2), 0, H);
    g.addColorStop(0,   `hsla(${w.h},55%,72%,${w.a})`);
    g.addColorStop(0.5, `hsla(${w.h},48%,65%,${w.a * 0.5})`);
    g.addColorStop(1,   `hsla(${w.h},40%,60%,0)`);
    ctx.fillStyle = g;
    ctx.fill();
  });
}

function draw(ts) {
  t = ts * 0.001;
  glow.x += (mouse.x - glow.x) * 0.055;
  glow.y += (mouse.y - glow.y) * 0.055;

  /* 1. base gradient — soft lavender-to-mint */
  const shift = (Math.sin(t * 0.06) + 1) / 2;
  const bg = ctx.createLinearGradient(0, 0, W * 0.6, H);
  bg.addColorStop(0,    `hsl(${245 + shift*14}, 48%, ${88 + shift*4}%)`);
  bg.addColorStop(0.45, `hsl(${210 + shift*20}, 42%, ${90 + shift*3}%)`);
  bg.addColorStop(1,    `hsl(${170 + shift*12}, 40%, ${88 + shift*4}%)`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  /* 2. aurora orbs */
  ORBS.forEach(o => {
    const px = (o.x + Math.sin(t * o.spd * 55 + o.off) * 0.13) * W;
    const py = (o.y + Math.cos(t * o.spd * 42 + o.off) * 0.10) * H;
    const pulse = 1 + Math.sin(t * 0.28 + o.off) * 0.08;
    const rr = ctx.createRadialGradient(px, py, 0, px, py, o.r * pulse);
    rr.addColorStop(0,   `hsla(${o.hue},${o.sat}%,${o.lit}%,${o.a})`);
    rr.addColorStop(0.55,`hsla(${o.hue+15},${o.sat-8}%,${o.lit-5}%,${o.a*0.45})`);
    rr.addColorStop(1,   `hsla(${o.hue+25},50%,70%,0)`);
    ctx.beginPath();
    ctx.arc(px, py, o.r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = rr;
    ctx.fill();
  });

  /* 3. slow wave layers */
  drawWaves();

  /* 4. cursor soft bloom */
  const cgr = ctx.createRadialGradient(glow.x, glow.y, 0, glow.x, glow.y, 170);
  cgr.addColorStop(0,   'rgba(124,110,230,0.09)');
  cgr.addColorStop(0.55,'rgba(125,213,200,0.04)');
  cgr.addColorStop(1,   'transparent');
  ctx.beginPath(); ctx.arc(glow.x, glow.y, 170, 0, Math.PI * 2);
  ctx.fillStyle = cgr; ctx.fill();

  /* 5. floating particles */
  DOTS.forEach(p => {
    p.x += p.vx; p.y -= p.vy; p.flk += p.fspd;
    if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
    if (p.x < 0 || p.x > 1) p.vx *= -1;
    const f = 0.5 + Math.sin(p.flk) * 0.5;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},60%,72%,${p.a * f})`;
    ctx.fill();
  });

  /* 6. very soft edge vignette to keep focus on card */
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.82);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(200,190,240,0.18)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}
mouse.x = W/2; mouse.y = H/2;
requestAnimationFrame(draw);
</script>

</body>
</html>
